<div class="sort">
    <bsa-select [options]="sortOptions"
                optionLabel="label"
                [dropdownWidth]="sortDropdownWidth"
                [(ngModel)]="sort">
    </bsa-select>
</div>

<div class="filters">
    <button>Filters</button>
</div>

<div class="results">
    <p>
        {{ 'offer.found' | translate }}
        <span>{{ offers | numberFormatter }}</span>
        {{ 'offer.jobOffers' | translate }}
    </p>
</div>
