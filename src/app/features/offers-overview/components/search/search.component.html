<div class="search-container">
    <span class="icon-search"></span>
    <input cdkOverlayOrigin
           #searchInput
           type="text"
           [formControl]="form"
    >
</div>

<ng-template
    cdkConnectedOverlay
    [cdkConnectedOverlayOrigin]="searchInput"
    [cdkConnectedOverlayOpen]="suggestionsOpen"
    [cdkConnectedOverlayWidth]="searchInput.offsetWidth"
    (overlayOutsideClick)="onOutsideClick($event)"
    (detach)="suggestionsOpen = false"
    (overlayKeydown)="onOverlayKeydown($event)">
    <bsa-dropdown>
        @if (suggestions$ | async; as suggestions) {
            @for (suggestionsGroup of suggestions; track suggestionsGroup.category; let last = $last) {
                <bsa-dropdown-group [title]="suggestionsGroup.category">
                    @for (suggestion of suggestionsGroup.suggestions; track suggestion) {
                        <bsa-dropdown-item [item]="{key: suggestion, value: suggestion}"></bsa-dropdown-item>
                    }
                </bsa-dropdown-group>
                @if (!last) {
                    <bsa-dropdown-separator></bsa-dropdown-separator>
                }
            }
        } @else {
            Nothing found
        }
    </bsa-dropdown>
</ng-template>
