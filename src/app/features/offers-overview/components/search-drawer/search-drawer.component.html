<bsa-drawer [title]="'global.search'"
            (closeDrawer)="onCloseDrawer()">
    <div class="search-drawer-container">
        <bsa-offers-search-input [formControl]="form">
        </bsa-offers-search-input>
        <bsa-suggestions [suggestions]="suggestions"
                         (suggestionSelected)="onSuggestionSelected($event)">
        </bsa-suggestions>
        <button>'global.search'</button>
    </div>
</bsa-drawer>
