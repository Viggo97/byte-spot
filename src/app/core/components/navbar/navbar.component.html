<nav>
    <div class="logo">
        <img src="../../../../assets/logo.svg" alt="logo">
    </div>

    <div class="icons-container">
        <button
            id="switch-theme-button"
            class="button-icon button-border-none"
            [ngClass]="darkTheme ? 'icon-moon' : 'icon-sun'"
            (click)="onSwitchTheme()">
        </button>
        <button
            id="change-language-button"
            class="button-icon button-border-none icon-language"
            cdkOverlayOrigin
            #languageButton
            (click)="languageDropdownOpen = !languageDropdownOpen">
        </button>
    </div>
</nav>

<ng-template
    cdkConnectedOverlay
    [cdkConnectedOverlayOrigin]="languageButton"
    [cdkConnectedOverlayOpen]="languageDropdownOpen"
    cdkConnectedOverlayWidth="8rem"
    (overlayOutsideClick)="$event.stopPropagation(); languageDropdownOpen = false"
    (detach)="languageDropdownOpen = false">
    <bsa-dropdown>
        @for (lang of languageOptions; track lang) {
            <bsa-dropdown-item
                [item]="lang"
                (selectItem)="onSelectOption($event)">
            </bsa-dropdown-item>
        }
    </bsa-dropdown>
</ng-template>
