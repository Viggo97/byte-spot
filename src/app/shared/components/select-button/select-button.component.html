<button
    id="change-language-button"
    class="button-icon button-border-none"
    cdkOverlayOrigin
    #selectButton
    (click)="open = !open; moveFocusToDropdown()">
    <bsa-icon [name]="icon" [size]="buttonSize"></bsa-icon>
</button>

<ng-template
    cdkConnectedOverlay
    [cdkConnectedOverlayOrigin]="selectButton"
    [cdkConnectedOverlayOpen]="open"
    [cdkConnectedOverlayWidth]="dropdownWidth"
    (overlayOutsideClick)="$event.stopPropagation(); open = false"
    (detach)="open = false; restoreFocusToButton()">
    <bsa-dropdown>
        @for (option of options; track option) {
            <bsa-dropdown-option [value]="option"
                                 (selectOption)="onSelectOption($event)">
                {{ option | selectValueConverter : optionLabel }}
            </bsa-dropdown-option>
        }
    </bsa-dropdown>
</ng-template>
