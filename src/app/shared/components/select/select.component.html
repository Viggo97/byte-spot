<button type="button"
        #buttonTrigger
        cdkOverlayOrigin
        (click)="open = !open">
    <span class="select-value">{{value}}</span>
    <span class="button-icon icon-arrows-up-down"></span>
</button>

<ng-template
    cdkConnectedOverlay
    [cdkConnectedOverlayOrigin]="buttonTrigger"
    [cdkConnectedOverlayOpen]="open"
    [cdkConnectedOverlayWidth]="buttonTrigger.offsetWidth"
    (overlayOutsideClick)="$event.stopPropagation(); open = false"
    (detach)="open = false">
    <bsa-dropdown>
        @for (option of options; track option) {
            <bsa-dropdown-item [item]="{key: option.key, value: option.value, label: option.label}"
                               (selectItem)="onSelectItem($event)">
            </bsa-dropdown-item>
        }
    </bsa-dropdown>
</ng-template>
