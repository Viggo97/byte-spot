<button type="button"
        #buttonTrigger
        cdkOverlayOrigin
        (click)="open = !open">
    <span>{{ value | selectValueConverter : optionLabel }}</span>
    <bsa-icon name="chevron-down"></bsa-icon>
</button>

<ng-template
    cdkConnectedOverlay
    [cdkConnectedOverlayOrigin]="buttonTrigger"
    [cdkConnectedOverlayOpen]="open"
    [cdkConnectedOverlayWidth]="buttonTrigger.offsetWidth"
    (overlayOutsideClick)="$event.stopPropagation(); open = false"
    (detach)="open = false">
    <bsa-dropdown>
        @for (option of options; track option) {
            <bsa-dropdown-option [value]="option"
                                 (selectOption)="onSelectOption($event)">
                {{ option | selectValueConverter : optionLabel }}
            </bsa-dropdown-option>
        }
    </bsa-dropdown>
</ng-template>
