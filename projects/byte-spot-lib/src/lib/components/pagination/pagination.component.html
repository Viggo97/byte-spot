<input
    type="number"
    #inputRef
    [attr.aria-label]="selectPageAriaLabel()"
    [attr.aria-labelledby]="selectPageAriaLabelledBy()"
    [disabled]="disabled()"
    [min]="1"
    [max]="pages()"
    [value]="page()"
    (blur)="onInputBlur()"
    (keydown.enter)="onInputEnter($any($event.target).valueAsNumber)">
