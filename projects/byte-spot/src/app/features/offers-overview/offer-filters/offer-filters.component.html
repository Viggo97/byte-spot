@if (compactMode) {
    <bsa-offer-filters-compact
        [form]="form"
        [locations]="locations"
        [technologies]="technologies"
        (filtersChange)="onFiltersChange()"
        (filtersReset)="onFiltersReset()">
    </bsa-offer-filters-compact>
} @else {
    <bsa-offer-filters-broad
        [form]="form"
        [locations]="locations"
        [technologies]="technologies"
        (filtersReset)="onFiltersReset()">
    </bsa-offer-filters-broad>
}
