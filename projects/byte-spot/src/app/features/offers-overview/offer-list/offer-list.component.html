@for (offer of offers$ | async; track offer.title) {
    @if (!loading) {
        <bsa-offer-list-item [offer]="offer"></bsa-offer-list-item>
    }
}

@if (!loading && !items.length) {
    <p class="no-offers">{{ 'offer.noResultsFound' | translate }}</p>
}

@if (loading) {
    @for (item of items; track item) {
        <bsa-offer-list-item></bsa-offer-list-item>
    }
}
