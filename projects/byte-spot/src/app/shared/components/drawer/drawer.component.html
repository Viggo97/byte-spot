<div cdkTrapFocus
     cdkTrapFocusAutoCapture="true"
     class="drawer-container">
    <header>
        <button class="button-secondary button-icon icon-x-mark close-button"
                (click)="close()">
        </button>
        @if (title) {
            <h2 class="text-ellipsis">{{ title }}</h2>
        }
    </header>
    <div class="drawer-content">
        <ng-content></ng-content>
    </div>
</div>
