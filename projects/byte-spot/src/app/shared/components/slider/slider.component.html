<div class="slider">
    <!-- eslint-disable-next-line @angular-eslint/template/click-events-have-key-events-->
    <div class="rail"
         [class.disabled]="disabled"
         tabindex="-1"
         #rail
         (click)="onRailClick($event)">
    </div>

    <div class="bar"
         [class.disabled]="disabled"
         [style.left]="barLeft"
         [style.right]="barRight">
    </div>

    <bsa-slider-markup [tabindex]="disabled ? -1 : 0"
                       [class.disabled]="disabled"
                       [bsaTooltip]="start.toString()"
                       #startMarkup
                       [ratio]="ratio"
                       [style.left]="markupStartPosition + 'px'"
                       [style.z-index]="overlappingMarkup === SliderMarkup.START ? 1 : 0"
                       (focus)="overlappingMarkup = SliderMarkup.START"
                       (changePosition)="onChangePositionMarkupStart($event)">
    </bsa-slider-markup>

    <bsa-slider-markup [tabindex]="disabled ? -1 : 0"
                       [class.disabled]="disabled"
                       [bsaTooltip]="end.toString()"
                       #endMarkup
                       [ratio]="ratio"
                       [style.left]="markupEndPosition + 'px'"
                       [style.z-index]="overlappingMarkup === SliderMarkup.END ? 1 : 0"
                       (focus)="overlappingMarkup = SliderMarkup.END"
                       (changePosition)="onChangePositionMarkupEnd($event)">
    </bsa-slider-markup>
</div>

<div class="limits">
    <span>{{ min }}</span>
    <span>{{ max }}</span>
</div>
