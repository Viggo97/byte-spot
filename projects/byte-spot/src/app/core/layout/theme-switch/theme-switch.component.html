<button
    class="bsl-button-icon"
    [attr.aria-label]="'global.changeTheme' | translate"
    (click)="onSwitchTheme()">
    @if (theme() === Theme.DARK) {
        <bsa-svg-icon name="icon-moon" size="1.25rem"></bsa-svg-icon>
    } @else {
        <bsa-svg-icon name="icon-sun" size="1.25rem"></bsa-svg-icon>
    }
</button>
